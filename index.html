<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Storage error/warning banners (aria-live regions) -->
  <div
    id="storage-error-banner"
    class="banner banner--error"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
    hidden
  ></div>
  <div
    id="storage-warning-banner"
    class="banner banner--warning"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    hidden
  ></div>

  <!-- ── Header: theme toggle ─────────────────────────────────────────── -->
  <header class="site-header" aria-label="Dashboard header">
    <span class="site-title">To-Do Life Dashboard</span>
    <button
      id="theme-toggle"
      class="theme-toggle-btn"
      type="button"
      aria-label="Switch to dark theme"
      aria-pressed="false"
    >
      <!-- Icon text updated by ThemeManager -->
      <span class="theme-toggle-icon" aria-hidden="true">☀️</span>
    </button>
  </header>

  <!-- ── Main content ──────────────────────────────────────────────────── -->
  <main class="dashboard-grid" aria-label="Dashboard widgets">

    <!-- ── 1. Greeting Widget ─────────────────────────────────────────── -->
    <section
      class="widget widget--greeting"
      aria-label="Greeting and clock"
    >
      <div class="widget__body">
        <!-- Live clock / date / greeting -->
        <div class="greeting__display">
          <p id="clock-display" class="clock-display" aria-label="Current time">--:--</p>
          <p id="date-display"  class="date-display"  aria-label="Current date">--</p>
          <p id="greeting-text" class="greeting-text" aria-live="polite" aria-atomic="true">Hello</p>
        </div>

        <!-- Name input form -->
        <div class="greeting__name-form">
          <label for="name-input" class="form-label">Your name</label>
          <div class="input-row">
            <input
              type="text"
              id="name-input"
              class="text-input"
              maxlength="50"
              placeholder="Enter your name…"
              aria-describedby="name-error"
              autocomplete="off"
            />
            <button
              id="name-save-btn"
              class="btn btn--primary"
              type="button"
              aria-label="Save name"
            >Save</button>
          </div>
          <p
            id="name-error"
            class="validation-error"
            role="alert"
            aria-live="polite"
            hidden
          ></p>
        </div>
      </div>
    </section>

    <!-- ── 2. Timer Widget ────────────────────────────────────────────── -->
    <section
      class="widget widget--timer"
      aria-label="Focus timer"
    >
      <div class="widget__header">
        <h2 class="widget__title">Focus Timer</h2>
      </div>
      <div class="widget__body">

        <!-- Countdown display -->
        <div class="timer__display-area">
          <p
            id="timer-display"
            class="timer-display"
            role="timer"
            aria-label="Timer countdown"
            aria-live="off"
          >25:00</p>
          <p
            id="timer-notification"
            class="timer-notification"
            role="status"
            aria-live="polite"
            aria-atomic="true"
            hidden
          ></p>
        </div>

        <!-- Timer controls -->
        <div class="timer__controls" role="group" aria-label="Timer controls">
          <button id="timer-start-btn" class="btn btn--primary" type="button" aria-label="Start timer">Start</button>
          <button id="timer-stop-btn"  class="btn btn--secondary" type="button" aria-label="Stop timer" disabled>Stop</button>
          <button id="timer-reset-btn" class="btn btn--secondary" type="button" aria-label="Reset timer">Reset</button>
        </div>

        <!-- Preset selector -->
        <div class="timer__preset-selector">
          <label for="preset-selector" class="form-label">Preset</label>
          <select
            id="preset-selector"
            class="select-input"
            aria-label="Select timer preset"
          >
            <!-- Options populated by TimerWidget -->
          </select>
        </div>

        <!-- Add preset form -->
        <form id="preset-add-form" class="timer__preset-form-wrapper" novalidate>
          <fieldset class="timer__preset-form">
            <legend class="form-legend">Add new preset</legend>

            <div class="form-field">
              <label for="preset-name-input" class="form-label">Preset name</label>
              <input
                type="text"
                id="preset-name-input"
                class="text-input"
                maxlength="50"
                placeholder="e.g. Short Break"
                aria-describedby="preset-error"
                autocomplete="off"
              />
            </div>

            <div class="form-field">
              <label for="preset-minutes-input" class="form-label">Duration (minutes)</label>
              <input
                type="number"
                id="preset-minutes-input"
                class="text-input text-input--short"
                min="1"
                max="180"
                placeholder="1–180"
                aria-describedby="preset-error"
              />
            </div>

            <button id="preset-add-btn" class="btn btn--primary" type="submit" aria-label="Add preset">
              Add Preset
            </button>

            <p
              id="preset-error"
              class="validation-error"
              role="alert"
              aria-live="polite"
              hidden
            ></p>
          </fieldset>
        </form>

      </div>
    </section>

    <!-- ── 3. Todo Widget ─────────────────────────────────────────────── -->
    <section
      class="widget widget--todo"
      aria-label="To-do list"
    >
      <div class="widget__header">
        <h2 class="widget__title">Tasks</h2>
      </div>
      <div class="widget__body">

        <!-- Add task form -->
        <div class="todo__add-form">
          <label for="todo-input" class="form-label">New task</label>
          <div class="input-row">
            <input
              type="text"
              id="todo-input"
              class="text-input"
              maxlength="200"
              placeholder="What needs to be done?"
              aria-describedby="todo-error"
              autocomplete="off"
            />
            <button id="todo-add-btn" class="btn btn--primary" type="button" aria-label="Add task">
              Add
            </button>
          </div>
          <p
            id="todo-error"
            class="validation-error"
            role="alert"
            aria-live="polite"
            hidden
          ></p>
        </div>

        <!-- Task list -->
        <ul
          id="todo-list"
          class="todo-list"
          aria-label="Task list"
          aria-live="polite"
        >
          <!-- Task items rendered by TodoWidget -->
        </ul>

      </div>
    </section>

    <!-- ── 4. Links Widget ────────────────────────────────────────────── -->
    <section
      class="widget widget--links"
      aria-label="Quick links"
    >
      <div class="widget__header">
        <h2 class="widget__title">Quick Links</h2>
      </div>
      <div class="widget__body">

        <!-- Add link form -->
        <fieldset class="links__add-form">
          <legend class="form-legend">Add new link</legend>

          <div class="form-field">
            <label for="link-label-input" class="form-label">Label</label>
            <input
              type="text"
              id="link-label-input"
              class="text-input"
              maxlength="50"
              placeholder="e.g. GitHub"
              aria-describedby="links-error"
              autocomplete="off"
            />
          </div>

          <div class="form-field">
            <label for="link-url-input" class="form-label">URL</label>
            <input
              type="url"
              id="link-url-input"
              class="text-input"
              maxlength="2048"
              placeholder="https://…"
              aria-describedby="links-error"
              autocomplete="off"
            />
          </div>

          <button id="link-add-btn" class="btn btn--primary" type="button" aria-label="Add link">
            Add Link
          </button>

          <p
            id="links-error"
            class="validation-error"
            role="alert"
            aria-live="polite"
            hidden
          ></p>
        </fieldset>

        <!-- Links list -->
        <ul
          id="links-list"
          class="links-list"
          aria-label="Saved links"
        >
          <!-- Link items rendered by LinksWidget -->
        </ul>

      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
